[tooling]
python_requires = ">=3.10"
runner = ".venv/bin/python"
bootstrap = "bash scripts/bootstrap_env.sh"

environment = "venv"

[testing]
framework = "pytest"
primary = "bash scripts/run_tests.sh tests/test_trace_schema.py -q"
fallback = "bash scripts/smoke_check.sh"
smoke = [
  "bash scripts/smoke_check.sh"
]
